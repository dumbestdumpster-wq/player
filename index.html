<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TMDb Multi-Server Player — Movies & TV</title>
<style>
  :root{
    --bg:#0d0d0d; --panel:#111; --muted:#1a1a1a; --accent:#2b6; --text:#e6e6e6;
    --gap:12px; --radius:10px;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
  .wrap{max-width:1100px;margin:14px auto;padding:16px;border-radius:12px;background:var(--panel);border:1px solid #222}
  header{display:flex;align-items:center;gap:12px}
  h1{font-size:18px;margin:0}
  .searchRow{display:flex;gap:8px;margin-top:12px}
  input[type="search"]{flex:1;padding:12px;border-radius:10px;border:1px solid #333;background:var(--muted);color:var(--text);font-size:16px}
  button,select,textarea{font-size:15px}
  .btn{background:#222;color:var(--text);border:1px solid #333;padding:10px 12px;border-radius:10px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  main{display:flex;gap:16px;margin-top:14px}
  .left{flex:0 0 360px;min-width:260px}
  .right{flex:1;min-width:320px}
  .panel{background:#0b0b0b;padding:12px;border-radius:10px;border:1px solid #222}
  #searchResults{max-height:62vh;overflow:auto;padding-right:6px}
  .result-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:10px;background:var(--muted);margin-bottom:10px;border:1px solid #222;cursor:pointer}
  .poster{width:64px;height:auto;border-radius:6px;flex-shrink:0}
  .muted{color:#9aa0a6;font-size:13px}
  #playerWrap{display:none}
  #playerContainer{background:#000;border-radius:10px;padding:8px;border:1px solid #222}
  iframe,video{width:100%;height:56vh;border-radius:8px;background:#000;border:0}
  .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .serverSelect{padding:10px;border-radius:10px;background:#111;border:1px solid #333;color:var(--text)}
  textarea#movieUrls{min-height:56px;resize:vertical}
  .warn{color:#ffb86b;font-weight:600;margin-top:8px}
  @media(max-width:900px){main{flex-direction:column}iframe,video{height:40vh}}
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="TMDb multi-server player">
  <header>
    <h1>🎬 TMDb Multi-Server Player</h1>
    <div style="margin-left:auto" class="muted">Mobile & TV friendly</div>
  </header>

  <div class="searchRow">
    <input id="searchInput" type="search" placeholder="Search movies or TV shows..." aria-label="Search" />
    <button id="searchBtn" class="btn" onclick="searchTMDB()">Search</button>
    <button id="showResultsBtn" class="btn" onclick="showResults()" style="display:none">Show results</button>
    <button id="toggleDownloaderBtn" class="btn" onclick="toggleMovieDownloader()">Movie Stream & Download</button>
  </div>

  <main style="margin-top:14px">
    <div class="left panel">
      <div id="searchResults" tabindex="0" aria-live="polite"></div>
      <div class="muted" style="margin-top:8px">Use Up/Down and Enter to navigate; Escape reopens results.</div>
    </div>

    <div class="right">
      <div id="selectorArea" class="panel" style="display:none" aria-hidden="true">
        <h2 id="selectedTitle" style="margin:0 0 8px 0"></h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:120px">
            <label class="muted">Season</label>
            <select id="seasonSelect" class="serverSelect" onchange="onSeasonChange()"></select>
          </div>
          <div style="flex:1;min-width:120px">
            <label class="muted">Episode</label>
            <select id="episodeSelect" class="serverSelect" onchange="onEpisodeChange()"></select>
          </div>
        </div>
      </div>

      <div id="playerWrap" class="panel" style="display:none" aria-hidden="true">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong id="playerTitle"></strong>
            <div id="serverStatus" class="muted" style="margin-top:6px"></div>
            <div id="serverWarn" class="warn" style="display:none">This server may be blocked or slow. Try another server if playback fails.</div>
          </div>

          <div class="controls" role="toolbar" aria-label="Player controls">
            <label class="muted" for="serverSelect">Server</label>
            <select id="serverSelect" class="serverSelect" onchange="onServerChange()"></select>
            <button class="btn" onclick="openEmbedInNewTab()">Open Embed</button>
            <button class="btn" onclick="copyEmbedUrl()">Copy Embed URL</button>
            <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
            <button id="proxyDownloadBtn" class="btn" onclick="downloadViaProxy()">Download via Proxy</button>
          </div>
        </div>

        <div id="playerContainer" style="margin-top:12px"></div>
      </div>

      <div id="movieDownloader" class="panel" style="display:none;margin-top:12px">
        <h3 style="margin-top:0">🎞️ Movie Stream & Download</h3>
        <label class="muted">Direct MP4 URL (comma-separated)</label>
        <textarea id="movieUrls" placeholder="https://cdn.example.com/movie.mp4, https://mirror.example.com/movie.mp4"></textarea>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          <button class="btn" onclick="loadMovieFromUrls()">Load MP4(s)</button>
          <button class="btn" onclick="clearMovieUrls()">Clear</button>
        </div>
        <div id="movieContainer" style="margin-top:12px"></div>
        <div class="muted" style="margin-top:8px">If direct MP4s are blocked by CORS, use a proxy for downloads.</div>
      </div>
    </div>
  </main>
</div>

<script>
/* -------------------------
   Configuration
   ------------------------- */
const API_KEY = "3ca5f3df3ee394337393273aa440c425"; // preserved
let currentID = null;
let currentType = null; // 'movie' or 'tv'
let currentSeason = 1;
let currentEpisode = 1;
let currentEmbedUrl = '';
let currentServerIndex = 0;

/* Servers: each server has a name and an array of pattern builders.
   When a server is chosen we try its patterns in order until one loads.
*/
const SERVERS = [
  {
    name: 'VidKing',
    patterns: [
      (id,s,e) => `https://www.vidking.net/embed/movie/${id}?autoPlay=true`,
      (id,s,e) => `https://www.vidking.net/embed/tv/${id}/${s}/${e}?autoPlay=true&nextEpisode=true&episodeSelector=true`
    ]
  },
  {
    name: '2Embed',
    patterns: [
      (id,s,e) => `https://www.2embed.cc/embed/${id}`,
      (id,s,e) => `https://www.2embed.cc/embed/tv?id=${id}&s=${s}&e=${e}`
    ]
  },
  {
    name: 'VidSrc',
    patterns: [
      (id,s,e) => `https://vidsrc.to/embed/movie/${id}`,
      (id,s,e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
      (id,s,e) => `https://vidsrc.to/embed/${id}`
    ]
  },
  {
    name: 'Gomo',
    patterns: [
      (id,s,e) => `https://gomo.to/embed/movie/${id}`,
      (id,s,e) => `https://gomo.to/embed/tv/${id}/${s}/${e}`,
      (id,s,e) => `https://gomo.to/embed/${id}`
    ]
  },
  {
    name: 'VidCloud',
    patterns: [
      (id,s,e) => `https://vidcloud.co/embed/${id}`,
      (id,s,e) => `https://vidcloud.co/embed/tv/${id}/${s}/${e}`
    ]
  },
  {
    name: 'AutoEmbed (watch-v2)',
    patterns: [
      (id,s,e) => `https://watch-v2.autoembed.app/movie/tmdb/${id}`,
      (id,s,e) => `https://watch-v2.autoembed.app/tv/tmdb/${id}/season/${s}/episode/${e}`
    ]
  },
  {
    name: 'MultiEmbed',
    patterns: [
      (id,s,e) => `https://multiembed.mov/?video_id=${id}&tmdb=1`
    ]
  }
];

/* -------------------------
   DOM refs
   ------------------------- */
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResults = document.getElementById('searchResults');
const showResultsBtn = document.getElementById('showResultsBtn');
const selectorArea = document.getElementById('selectorArea');
const selectedTitleEl = document.getElementById('selectedTitle');
const seasonSelect = document.getElementById('seasonSelect');
const episodeSelect = document.getElementById('episodeSelect');
const playerWrap = document.getElementById('playerWrap');
const playerContainer = document.getElementById('playerContainer');
const playerTitle = document.getElementById('playerTitle');
const serverSelect = document.getElementById('serverSelect');
const serverStatus = document.getElementById('serverStatus');
const serverWarn = document.getElementById('serverWarn');

/* -------------------------
   Search (TMDb) with fallback
   ------------------------- */
async function searchTMDB(){
  const q = searchInput.value.trim();
  if(!q) return alert('Type something first!');
  searchBtn.disabled = true;
  searchResults.innerHTML = '<div class="muted">Searching…</div>';

  const urlM = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`;
  const urlT = `https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(q)}`;

  try {
    const [mRes, tRes] = await Promise.all([fetch(urlM), fetch(urlT)]);
    if (mRes.status === 429 || tRes.status === 429 || !mRes.ok || !tRes.ok) {
      await fallbackSearch(q);
      return;
    }
    const movies = await mRes.json();
    const tv = await tRes.json();
    displayResults(movies.results || [], tv.results || []);
  } catch (err) {
    console.warn('TMDb failed, using fallback', err);
    await fallbackSearch(q);
  } finally {
    searchBtn.disabled = false;
  }
}

async function fallbackSearch(query){
  // Minimal public fallbacks: YTS for movies, TVMaze for TV
  const movies = [];
  const tv = [];
  try {
    const yts = await fetch(`https://yts.mx/api/v2/list_movies.json?query_term=${encodeURIComponent(query)}`).then(r=>r.json()).catch(()=>null);
    if (yts && yts.status === 'ok' && Array.isArray(yts.data.movies)) {
      yts.data.movies.forEach(m => movies.push({ id: m.id, media_type: 'movie', title: m.title, poster_full: m.large_cover_image }));
    }
  } catch(e){ console.warn('YTS fallback failed', e); }

  try {
    const tvm = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`).then(r=>r.json()).catch(()=>null);
    if (Array.isArray(tvm)) {
      tvm.forEach(item => {
        if (item.show) tv.push({ id: item.show.id, media_type: 'tv', name: item.show.name, poster_full: item.show.image ? item.show.image.original : null });
      });
    }
  } catch(e){ console.warn('TVMaze fallback failed', e); }

  if (movies.length === 0 && tv.length === 0) {
    searchResults.innerHTML = '<div class="muted">No results found (TMDb may be rate-limited).</div>';
    return;
  }
  displayResults(movies, tv);
}

/* -------------------------
   Display results
   ------------------------- */
function displayResults(movies, tv){
  searchResults.innerHTML = '';
  const all = [
    ...movies.map(m => ({...m, media_type:'movie'})),
    ...tv.map(t => ({...t, media_type:'tv'}))
  ];
  if(all.length === 0){ searchResults.innerHTML = '<div class="muted">No results found.</div>'; return; }
  all.forEach(item => {
    const title = item.media_type === 'movie' ? (item.title || item.name) : (item.name || item.title);
    const poster = item.poster_full || (item.poster_path ? (item.poster_path.startsWith('http') ? item.poster_path : `https://image.tmdb.org/t/p/w200${item.poster_path}`) : '');
    const div = document.createElement('div');
    div.className = 'result-item';
    div.tabIndex = 0;
    div.innerHTML = `<div style="display:flex;align-items:center;gap:10px"><div style="min-width:0"><strong>${escapeHtml(title)}</strong><div class="muted">${item.media_type.toUpperCase()}</div></div>${poster?`<img class="poster" src="${poster}" alt="">`:''}</div>`;
    div.onclick = () => selectItem(item.id, item.media_type, title);
    div.onkeydown = (e) => { if(e.key === 'Enter') selectItem(item.id, item.media_type, title); };
    searchResults.appendChild(div);
  });
  const first = searchResults.querySelector('.result-item');
  if(first) first.focus();
}

/* -------------------------
   Selection & UI behavior
   ------------------------- */
function selectItem(id, type, title){
  currentID = id;
  currentType = type;
  selectedTitleEl.textContent = title;
  selectorArea.style.display = 'block';
  playerWrap.style.display = 'block';
  searchResults.style.display = 'none';
  showResultsBtn.style.display = 'inline-block';
  currentSeason = 1;
  currentEpisode = 1;
  currentServerIndex = 0;
  populateServerSelect();
  serverWarn.style.display = 'none';
  serverStatus.textContent = '';
  if(type === 'movie'){
    seasonSelect.style.display = 'none';
    episodeSelect.style.display = 'none';
    loadMoviePlayer();
  } else {
    seasonSelect.style.display = '';
    episodeSelect.style.display = '';
    loadSeasons();
  }
  setTimeout(()=> serverSelect.focus(), 200);
}

function showResults(){
  searchResults.style.display = '';
  showResultsBtn.style.display = 'none';
  const first = searchResults.querySelector('.result-item');
  if(first) first.focus();
}

/* -------------------------
   Seasons & Episodes (fixed)
   ------------------------- */
async function loadSeasons(){
  if(!currentID) return;
  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${currentID}?api_key=${API_KEY}`);
    if(!res.ok) throw new Error('TMDb seasons fetch failed');
    const data = await res.json();
    const seasons = (data.seasons || []).filter(s => typeof s.season_number === 'number');
    seasonSelect.innerHTML = '';
    // prefer seasons > 0
    const usable = seasons.filter(s => s.season_number > 0);
    const list = usable.length ? usable : seasons;
    list.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.season_number;
      opt.textContent = `Season ${s.season_number}`;
      seasonSelect.appendChild(opt);
    });
    const defaultSeason = list.find(s => s.season_number > 0) ? list.find(s => s.season_number > 0).season_number : (list[0] ? list[0].season_number : 1);
    seasonSelect.value = defaultSeason;
    currentSeason = parseInt(seasonSelect.value, 10) || 1;
    await loadEpisodes();
  } catch(err){
    console.warn('loadSeasons failed', err);
    seasonSelect.innerHTML = `<option value="1">Season 1</option>`;
    episodeSelect.innerHTML = `<option value="1">Episode 1</option>`;
    loadPlayer();
  }
}

async function loadEpisodes(){
  const season = parseInt(seasonSelect.value, 10) || 1;
  currentSeason = season;
  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${currentID}/season/${season}?api_key=${API_KEY}`);
    if(!res.ok) throw new Error('TMDb episodes fetch failed');
    const data = await res.json();
    const eps = data.episodes || [];
    episodeSelect.innerHTML = '';
    eps.forEach(ep => {
      const opt = document.createElement('option');
      opt.value = ep.episode_number;
      opt.textContent = `Episode ${ep.episode_number}${ep.name ? ' — ' + ep.name : ''}`;
      episodeSelect.appendChild(opt);
    });
    episodeSelect.value = eps.length ? eps[0].episode_number : 1;
    currentEpisode = parseInt(episodeSelect.value, 10) || 1;
    loadPlayer();
  } catch(err){
    console.warn('loadEpisodes failed', err);
    episodeSelect.innerHTML = `<option value="1">Episode 1</option>`;
    currentEpisode = 1;
    loadPlayer();
  }
}

function onSeasonChange(){ loadEpisodes(); }
function onEpisodeChange(){ currentEpisode = parseInt(episodeSelect.value,10) || 1; loadPlayer(); }

/* -------------------------
   Server selection & embed loading
   ------------------------- */
function populateServerSelect(){
  serverSelect.innerHTML = '';
  SERVERS.forEach((s, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = s.name;
    serverSelect.appendChild(opt);
  });
  serverSelect.value = currentServerIndex;
  serverStatus.textContent = `Selected server: ${SERVERS[currentServerIndex].name}`;
}

function onServerChange(){
  currentServerIndex = parseInt(serverSelect.value, 10);
  serverWarn.style.display = 'none';
  if(currentType === 'tv'){
    const s = parseInt(seasonSelect.value,10) || 1;
    const e = parseInt(episodeSelect.value,10) || 1;
    tryServerPatterns(currentServerIndex, s, e);
  } else {
    tryServerPatterns(currentServerIndex);
  }
}

/* Try patterns for the chosen server in order until one loads (no auto-switch between servers).
   Each pattern gets a short timeout; if none succeed we show a warning.
*/
function tryServerPatterns(serverIndex, season = 1, episode = 1){
  const server = SERVERS[serverIndex];
  if(!server || !server.patterns || server.patterns.length === 0) return;
  playerContainer.innerHTML = '';
  serverWarn.style.display = 'none';
  serverStatus.textContent = `Trying ${server.name} patterns...`;
  currentEmbedUrl = '';
  let i = 0;
  let succeeded = false;

  function tryNext(){
    if(succeeded || i >= server.patterns.length){
      if(!succeeded){
        serverStatus.textContent = `${server.name} — no working pattern found`;
        serverWarn.style.display = 'block';
      }
      return;
    }
    const url = server.patterns[i](currentID, season, episode);
    i++;
    currentEmbedUrl = url;
    playerContainer.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
    iframe.allowFullscreen = true;

    let loaded = false;
    const onLoad = () => {
      loaded = true;
      succeeded = true;
      serverStatus.textContent = `Using ${server.name}`;
      serverWarn.style.display = 'none';
      iframe.removeEventListener('load', onLoad);
      clearTimeout(timeoutId);
    };
    iframe.addEventListener('load', onLoad);

    const timeoutId = setTimeout(() => {
      if(!loaded) tryNext();
    }, 6000);

    playerContainer.appendChild(iframe);
  }

  tryNext();
}

/* -------------------------
   Movie player (simple)
   ------------------------- */
function loadMoviePlayer(){
  tryServerPatterns(currentServerIndex);
}

/* -------------------------
   Render helpers & controls
   ------------------------- */
function openEmbedInNewTab(){
  if(!currentEmbedUrl) return alert('No embed URL available yet.');
  window.open(currentEmbedUrl, '_blank', 'noopener');
}
function copyEmbedUrl(){
  if(!currentEmbedUrl) return alert('No embed URL available yet.');
  navigator.clipboard?.writeText(currentEmbedUrl).then(()=> alert('Embed URL copied')).catch(()=> alert('Copy failed'));
}
function toggleFullscreen(){
  const wrap = document.getElementById('playerWrap');
  if(!document.fullscreenElement) wrap.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}
function setServerStatus(text){ serverStatus.textContent = text; }

/* -------------------------
   Movie downloader (direct MP4s)
   ------------------------- */
function toggleMovieDownloader(){ document.getElementById('movieDownloader').style.display = document.getElementById('movieDownloader').style.display === 'none' ? 'block' : 'none'; }
function clearMovieUrls(){ document.getElementById('movieUrls').value=''; document.getElementById('movieContainer').innerHTML=''; setServerStatus('Cleared direct media'); }

async function loadMovieFromUrls(){
  const raw = document.getElementById('movieUrls').value.trim();
  if(!raw) return alert('Enter at least one direct MP4 URL (comma-separated allowed).');
  const urls = raw.split(',').map(s=>s.trim()).filter(Boolean);
  const container = document.getElementById('movieContainer');
  container.innerHTML = 'Checking URLs...';
  for(const url of urls){
    try{
      const res = await fetch(url, { method: 'HEAD', mode: 'cors' });
      const ac = res.headers.get('access-control-allow-origin');
      const contentType = res.headers.get('content-type') || '';
      const ok = res.ok && (ac === '*' || ac !== null) && contentType.includes('video');
      if(ok){
        container.innerHTML = '';
        const video = document.createElement('video');
        video.controls = true;
        video.src = url;
        video.preload = 'metadata';
        video.style.maxWidth = '100%';
        const dl = document.createElement('a');
        dl.href = url;
        dl.download = url.split('/').pop() || 'movie.mp4';
        dl.textContent = 'Download MP4';
        dl.style.display = 'inline-block';
        dl.style.marginTop = '8px';
        container.appendChild(video);
        container.appendChild(dl);
        setServerStatus('Direct MP4 loaded (download available)');
        return;
      }
    }catch(e){ console.warn('URL check failed', url, e); }
  }
  container.innerHTML = 'No direct MP4 with CORS found. Using selected embed server.';
  tryServerPatterns(currentServerIndex, currentSeason, currentEpisode);
}

/* -------------------------
   Download via proxy (placeholder)
   ------------------------- */
const PROXY_BASE_URL = ''; // set to your proxy endpoint if you have one
const PUBLIC_PROXY_PATTERNS = ['https://corsproxy.io/?','https://api.allorigins.win/raw?url=','https://thingproxy.freeboard.io/fetch/'];
function buildProxyUrl(pattern, target){ return pattern + encodeURIComponent(target); }
function downloadViaProxy(){
  const target = currentEmbedUrl;
  if(!target) return alert('No embed URL available to proxy-download.');
  if(PROXY_BASE_URL && PROXY_BASE_URL.trim() !== ''){
    window.open(PROXY_BASE_URL + encodeURIComponent(target), '_blank', 'noopener');
    return;
  }
  for(const p of PUBLIC_PROXY_PATTERNS){ window.open(buildProxyUrl(p, target), '_blank', 'noopener'); return; }
  alert('No proxy configured. Deploy a small proxy and set PROXY_BASE_URL in the script for reliable downloads.');
}

/* -------------------------
   Keyboard / remote navigation
   ------------------------- */
document.addEventListener('keydown', (e) => {
  const active = document.activeElement;
  if(searchResults.style.display !== 'none' && (e.key === 'ArrowDown' || e.key === 'ArrowUp')){
    e.preventDefault();
    const items = Array.from(searchResults.querySelectorAll('.result-item'));
    if(items.length === 0) return;
    let idx = items.indexOf(active);
    if(idx === -1) idx = 0;
    if(e.key === 'ArrowDown') idx = Math.min(items.length - 1, idx + 1);
    else idx = Math.max(0, idx - 1);
    items[idx].focus();
  }
  if((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && document.activeElement === serverSelect){
    e.preventDefault();
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    let next = (parseInt(serverSelect.value,10) + dir + SERVERS.length) % SERVERS.length;
    serverSelect.value = next;
    onServerChange();
  }
  if(e.key === 'Escape'){ if(searchResults.style.display === 'none') showResults(); }
});

/* -------------------------
   Utilities
   ------------------------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* -------------------------
   Init
   ------------------------- */
document.addEventListener('DOMContentLoaded', () => {
  // populate server select initially
  populateServerSelect();
  // focus search
  setTimeout(()=> searchInput.focus(), 200);
  // Enter in search triggers search
  searchInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') searchTMDB(); });
});
</script>
</body>
</html>
