<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Personal Streaming Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        background: #0d0d0d;
        color: white;
        font-family: Arial, sans-serif;
    }

    header {
        padding: 15px;
        background: #111;
        display: flex;
        gap: 10px;
    }

    input {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: #222;
        color: white;
    }

    button {
        padding: 10px 15px;
        background: #444;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #666;
    }

    #results {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 15px;
    }

    .item {
        cursor: pointer;
        background: #1a1a1a;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
    }

    .item img {
        width: 100%;
        border-radius: 6px;
    }

    #player-container {
        width: 100%;
        height: 70vh;
        background: black;
        position: relative;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    #fullscreenBtn {
        position: absolute;
        bottom: 15px;
        right: 15px;
        background: rgba(0,0,0,0.6);
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
        color: white;
        font-size: 14px;
    }

    #serverSelect {
        margin: 10px;
        padding: 10px;
        background: #222;
        color: white;
        border-radius: 6px;
        border: none;
    }
</style>
</head>

<body>

<header>
    <input id="searchInput" placeholder="Search movies or TV shows…">
    <button onclick="searchTMDB()">Search</button>
</header>

<select id="serverSelect" onchange="reloadServer()">
    <option value="vidking">VidKing (Primary)</option>
    <option value="2embed">2Embed</option>
</select>

<div id="player-container">
    <iframe id="player"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen>
    </iframe>

    <div id="fullscreenBtn" onclick="toggleFullscreen()">Fullscreen</div>
</div>

<div id="results"></div>

<script>
const TMDB_KEY = "3ca5f3df3ee394337393273aa440c425";

let currentID = null;
let currentType = "movie";
let currentSeason = 1;
let currentEpisode = 1;

function searchTMDB() {
    const q = document.getElementById("searchInput").value;
    if (!q) return;

    fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`)
        .then(r => r.json())
        .then(data => {
            const results = document.getElementById("results");
            results.innerHTML = "";

            data.results.forEach(item => {
                if (!item.poster_path) return;

                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                    <p>${item.title || item.name}</p>
                `;

                div.onclick = () => {
                    currentID = item.id;
                    currentType = item.media_type;
                    loadPlayer();
                };

                results.appendChild(div);
            });
        });
}

function loadPlayer() {
    const server = document.getElementById("serverSelect").value;
    const iframe = document.getElementById("player");

    let src = "";

    if (currentType === "tv") {
        if (server === "vidking") {
            src = `https://www.vidking.net/embed/tv/${currentID}/${currentSeason}/${currentEpisode}`;
        } else if (server === "2embed") {
            src = `https://www.2embed.cc/embedtv/${currentID}&s=${currentSeason}&e=${currentEpisode}`;
        }
    } else {
        if (server === "vidking") {
            src = `https://www.vidking.net/embed/movie/${currentID}`;
        } else if (server === "2embed") {
            src = `https://www.2embed.cc/embed/${currentID}`;
        }
    }

    iframe.src = src;
}

function reloadServer() {
    if (currentID) loadPlayer();
}

function toggleFullscreen() {
    const container = document.getElementById("player-container");

    if (!document.fullscreenElement) {
        container.requestFullscreen().catch(err => console.log(err));
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
