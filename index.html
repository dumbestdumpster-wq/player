<!DOCTYPE html>
<html>
<head>
  <title>Ultimate TMDb Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0d0d0d;
      color: #e6e6e6;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: #111;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #222;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 15px;
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 16px;
    }

    button, select {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      margin-bottom: 10px;
    }

    button:hover {
      background: #444;
    }

    .result-item {
      cursor: pointer;
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      transition: 0.2s;
    }

    .result-item:hover {
      background: #222;
    }

    img {
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid #333;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #333;
      border-radius: 8px;
      background: black;
    }

    #serverSelect {
      margin-top: 10px;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>🎬 Ultimate TMDb Player</h2>

  <input id="searchInput" type="text" placeholder="Search movies or TV shows...">
  <button onclick="searchTMDB()">Search</button>

  <div id="searchResults" style="margin-top:20px;"></div>

  <select id="serverSelect" onchange="reloadPlayer()" style="display:none;">
    <option value="vidking">VidKing (Recommended)</option>
    <option value="vidsrc">VidSrc</option>
    <option value="2embed">2Embed</option>
    <option value="multiembed">MultiEmbed</option>
    <option value="autoembed">AutoEmbed</option>
  </select>

  <div id="playerContainer" style="margin-top:20px;"></div>
</div>

<script>
const API_KEY = "3ca5f3df3ee394337393273aa440c425";

let currentID = null;
let currentType = null;

// -------------------------
// SEARCH TMDB
// -------------------------
function searchTMDB() {
  const query = document.getElementById("searchInput").value;
  if (!query) return alert("Type something first!");

  const urlMovie = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;
  const urlTV = `https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(query)}`;

  Promise.all([fetch(urlMovie), fetch(urlTV)])
    .then(responses => Promise.all(responses.map(r => r.json())))
    .then(([movies, tv]) => displayResults(movies.results, tv.results));
}

// -------------------------
// DISPLAY RESULTS
// -------------------------
function displayResults(movies, tv) {
  const container = document.getElementById("searchResults");
  container.innerHTML = "<h3>Results:</h3>";

  const all = [
    ...movies.map(m => ({...m, media_type: "movie"})),
    ...tv.map(t => ({...t, media_type: "tv"}))
  ];

  if (all.length === 0) {
    container.innerHTML = "<p>No results found.</p>";
    return;
  }

  all.forEach(item => {
    const title = item.media_type === "movie" ? item.title : item.name;
    const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : "";

    container.innerHTML += `
      <div class="result-item" onclick="selectItem(${item.id}, '${item.media_type}', '${title.replace(/'/g, "\\'")}')">
        <strong>${title}</strong> (${item.media_type.toUpperCase()})<br>
        ${poster ? `<img src="${poster}">` : ""}
      </div>
    `;
  });
}

// -------------------------
// SELECT ITEM
// -------------------------
function selectItem(id, type, title) {
  currentID = id;
  currentType = type;

  // Hide results but keep search bar
  document.getElementById("searchResults").style.display = "none";

  // Show server selector
  document.getElementById("serverSelect").style.display = "block";

  reloadPlayer();
}

// -------------------------
// BUILD STREAM URLS
// -------------------------
function getStreamURL(server) {
  if (currentType === "movie") {
    switch(server) {
      case "vidsrc": return `https://vidsrc.to/embed/movie/${currentID}`;
      case "2embed": return `https://www.2embed.cc/embed/${currentID}`;
      case "multiembed": return `https://multiembed.mov/?video_id=${currentID}&tmdb=1`;
      case "autoembed": return `https://watch-v2.autoembed.app/movie/tmdb/${currentID}`;
      default: return `https://www.vidking.net/embed/movie/${currentID}?autoPlay=true`;
    }
  }

  // TV SHOWS — VidKing handles episodes internally
  switch(server) {
    case "vidsrc": return `https://vidsrc.to/embed/tv/${currentID}/1/1`;
    case "2embed": return `https://www.2embed.cc/embed/tv?id=${currentID}&s=1&e=1`;
    case "multiembed": return `https://multiembed.mov/?video_id=${currentID}&tmdb=1`;
    case "autoembed": return `https://watch-v2.autoembed.app/tv/tmdb/${currentID}/season/1/episode/1`;
    default: return `https://www.vidking.net/embed/tv/${currentID}/1/1?autoPlay=true&episodeSelector=true`;
  }
}

// -------------------------
// LOAD PLAYER
// -------------------------
function reloadPlayer() {
  const server = document.getElementById("serverSelect").value;
  const url = getStreamURL(server);

  document.getElementById("playerContainer").innerHTML = `
    <iframe 
      src="${url}"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen>
    </iframe>
  `;
}
</script>

</body>
</html>
