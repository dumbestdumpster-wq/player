<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TMDb + Multi-Server Player</title>
<style>
  :root{--bg:#0d0d0d;--panel:#111;--muted:#1a1a1a;--accent:#2b6}
  body{background:var(--bg);color:#e6e6e6;font-family:Arial,Helvetica,sans-serif;margin:0;padding:20px}
  .container{max-width:1100px;margin:auto;background:var(--panel);padding:18px;border-radius:12px;border:1px solid #222}
  input,select,textarea{width:100%;padding:10px;margin-top:8px;margin-bottom:12px;background:var(--muted);color:#eee;border:1px solid #333;border-radius:6px}
  button{padding:10px 14px;border-radius:6px;border:none;background:#333;color:#fff;cursor:pointer}
  .row{display:flex;gap:12px;align-items:center}
  .result-item{cursor:pointer;margin-bottom:12px;padding:12px;border-radius:8px;background:var(--muted);border:1px solid #222;display:flex;justify-content:space-between;align-items:center}
  img.poster{width:70px;height:auto;border-radius:6px;margin-left:10px}
  #playerWrap{margin-top:18px;background:#000;border-radius:8px;padding:8px;border:1px solid #222}
  iframe,video{width:100%;border-radius:6px;background:#000}
  iframe{height:560px;border:0}
  video{height:560px}
  .controls{display:flex;gap:8px;margin-top:8px;align-items:center}
  .small{padding:6px 8px;font-size:14px}
  .muted{color:#aaa;font-size:13px}
  @media(max-width:800px){iframe,video{height:320px}}
</style>
</head>
<body>
<div class="container">
  <h2>🎬 TMDb + Multi-Server Player</h2>

  <label><strong>Search (movies & TV)</strong></label>
  <input id="searchInput" placeholder="Search movies or TV shows..." />
  <div class="row" style="margin-top:8px">
    <button onclick="searchTMDB()">Search</button>
    <button onclick="toggleMovieDownloader()" class="small">Movie Stream & Download</button>
  </div>

  <div id="searchResults" style="margin-top:16px"></div>

  <div id="selectorArea" style="margin-top:16px;display:none">
    <h3 id="selectedTitle"></h3>
    <label>Season:</label>
    <select id="seasonSelect" onchange="loadEpisodes()"></select>
    <label>Episode:</label>
    <select id="episodeSelect" onchange="loadPlayer()"></select>
  </div>

  <div id="playerWrap" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <strong id="playerTitle"></strong>
        <div class="muted" id="serverStatus"></div>
      </div>
      <div class="controls">
        <label class="muted" style="margin-right:8px">Server</label>
        <select id="serverSelect" onchange="onServerChange()" class="small"></select>
        <button onclick="toggleFullscreen()" class="small">Fullscreen</button>
        <button id="downloadBtn" onclick="downloadCurrent()" class="small">Download</button>
      </div>
    </div>

    <div id="playerContainer" style="margin-top:12px"></div>
  </div>

  <!-- Movie downloader panel -->
  <div id="movieDownloader" style="display:none;margin-top:18px">
    <h3>🎞️ Movie Stream & Download</h3>
    <label>Direct MP4 URL (comma-separated mirrors allowed)</label>
    <textarea id="movieUrls" rows="2" placeholder="https://cdn1.example.com/movie.mp4, https://mirror.example.com/movie.mp4"></textarea>
    <div class="row" style="margin-top:8px">
      <button onclick="loadMovieFromUrls()" class="small">Load MP4(s)</button>
      <button onclick="clearMovieUrls()" class="small">Clear</button>
    </div>
    <div id="movieContainer" style="margin-top:12px"></div>
    <div class="muted" style="margin-top:8px">If direct MP4s are not available or CORS blocks playback/download, the selected embed server will be used.</div>
  </div>
</div>

<script>
/* -------------------------
   Configuration & constants
   ------------------------- */
const API_KEY = "3ca5f3df3ee394337393273aa440c425"; // preserved
let currentID = null;
let currentType = null;
let currentDirectMedia = null; // {type:'video', url:'', corsOk:true/false}
let currentEmbedServerIndex = 0;

/* Embed server factories. VidKing kept intact as first entry. */
const EMBED_SERVERS = [
  (id, type, season, episode) => type === 'movie'
    ? `https://www.vidking.net/embed/movie/${id}?autoPlay=true`
    : `https://www.vidking.net/embed/tv/${id}/${season}/${episode}?autoPlay=true&nextEpisode=true&episodeSelector=true`,

  (id, type, season, episode) => type === 'movie'
    ? `https://www.2embed.cc/embed/${id}`
    : `https://www.2embed.cc/embed/tv?id=${id}&s=${season}&e=${episode}`,

  (id, type, season, episode) => type === 'movie'
    ? `https://vidsrc.to/embed/movie/${id}`
    : `https://vidsrc.to/embed/tv/${id}/${season}/${episode}`,

  (id, type, season, episode) => type === 'movie'
    ? `https://autoembed.cc/movie/tmdb/${id}`
    : `https://autoembed.cc/tv/tmdb/${id}/season/${season}/episode/${episode}`,

  (id, type, season, episode) => `https://multiembed.mov/?video_id=${id}&tmdb=1`
];

/* -------------------------
   TMDb search & selection
   ------------------------- */
function searchTMDB(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return alert('Type something first!');
  const urlM = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`;
  const urlT = `https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(q)}`;
  Promise.all([fetch(urlM), fetch(urlT)])
    .then(res => Promise.all(res.map(r => r.json())))
    .then(([movies, tv]) => displayResults(movies.results || [], tv.results || []))
    .catch(err => { console.error(err); alert('Search failed'); });
}

function displayResults(movies, tv){
  const container = document.getElementById('searchResults');
  container.innerHTML = '<h3>Results:</h3>';
  const all = [
    ...movies.map(m => ({...m, media_type:'movie'})),
    ...tv.map(t => ({...t, media_type:'tv'}))
  ];
  if(all.length === 0){ container.innerHTML += '<p>No results found.</p>'; return; }
  all.forEach(item => {
    const title = item.media_type === 'movie' ? item.title : item.name;
    const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : '';
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `<div><strong>${escapeHtml(title)}</strong><div class="muted">${item.media_type.toUpperCase()}</div></div>${poster?`<img class="poster" src="${poster}" alt="">`:''}`;
    div.onclick = () => selectItem(item.id, item.media_type, title);
    container.appendChild(div);
  });
}

/* -------------------------
   Selection & player logic
   ------------------------- */
function selectItem(id, type, title){
  currentID = id; currentType = type;
  document.getElementById('selectedTitle').innerText = title;
  document.getElementById('selectorArea').style.display = 'block';
  document.getElementById('playerWrap').style.display = 'block';
  document.getElementById('playerTitle').innerText = title;
  currentDirectMedia = null;
  currentEmbedServerIndex = 0;
  populateServerSelect();
  if(type === 'movie') loadMoviePlayer();
  else loadSeasons();
}

function loadMoviePlayer(){
  // Use the server selected by the user (no automatic switching)
  showEmbedServer(currentEmbedServerIndex);
}

function loadSeasons(){
  fetch(`https://api.themoviedb.org/3/tv/${currentID}?api_key=${API_KEY}`)
    .then(r => r.json())
    .then(data => {
      const seasonSelect = document.getElementById('seasonSelect');
      seasonSelect.innerHTML = '';
      (data.seasons || []).forEach(s => {
        if(s.season_number > 0) seasonSelect.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
      });
      loadEpisodes();
    })
    .catch(err => console.error(err));
}

function loadEpisodes(){
  const season = document.getElementById('seasonSelect').value;
  fetch(`https://api.themoviedb.org/3/tv/${currentID}/season/${season}?api_key=${API_KEY}`)
    .then(r => r.json())
    .then(data => {
      const episodeSelect = document.getElementById('episodeSelect');
      episodeSelect.innerHTML = '';
      (data.episodes || []).forEach(ep => episodeSelect.innerHTML += `<option value="${ep.episode_number}">Episode ${ep.episode_number}</option>`);
      loadPlayer();
    })
    .catch(err => console.error(err));
}

function loadPlayer(){
  const season = document.getElementById('seasonSelect').value;
  const episode = document.getElementById('episodeSelect').value;
  showEmbedServer(currentEmbedServerIndex, season, episode);
}

/* -------------------------
   Embed server handling (manual only)
   ------------------------- */
function populateServerSelect(){
  const sel = document.getElementById('serverSelect');
  sel.innerHTML = '';
  EMBED_SERVERS.forEach((fn, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = `Server ${idx+1}`;
    sel.appendChild(opt);
  });
  sel.value = currentEmbedServerIndex;
  setServerStatus(`Selected server ${parseInt(sel.value,10)+1}`);
}

function onServerChange(){
  const sel = document.getElementById('serverSelect');
  currentEmbedServerIndex = parseInt(sel.value, 10);
  // If a direct video is playing, keep it; otherwise reload embed with chosen server
  if(!currentDirectMedia) {
    // For TV, preserve season/episode
    const season = document.getElementById('seasonSelect') ? document.getElementById('seasonSelect').value : 1;
    const episode = document.getElementById('episodeSelect') ? document.getElementById('episodeSelect').value : 1;
    showEmbedServer(currentEmbedServerIndex, season, episode);
  } else {
    setServerStatus(`Selected server ${currentEmbedServerIndex+1} (direct media loaded; server used only for embeds)`);
  }
}

function showEmbedServer(index, season = 1, episode = 1){
  const url = EMBED_SERVERS[index](currentID, currentType, season, episode);
  const container = document.getElementById('playerContainer');
  container.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.id = 'embedFrame';
  iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
  iframe.allowFullscreen = true;
  iframe.onload = () => {
    setServerStatus(`Using server ${index+1}`);
  };
  container.appendChild(iframe);
  setServerStatus(`Using server ${index+1}`);
}

/* -------------------------
   Fullscreen & download
   ------------------------- */
function toggleFullscreen(){
  const wrap = document.getElementById('playerWrap');
  if(!document.fullscreenElement) wrap.requestFullscreen().catch(()=>{});
  else document.exitFullscreen().catch(()=>{});
}

function setServerStatus(text){
  document.getElementById('serverStatus').innerText = text;
}

/* Download current media:
   - If a direct media URL is loaded (currentDirectMedia), attempt direct download.
   - Otherwise instruct user to use the Movie Stream & Download panel.
*/
async function downloadCurrent(){
  if(currentDirectMedia && currentDirectMedia.url){
    const url = currentDirectMedia.url;
    try{
      const res = await fetch(url, { method: 'HEAD', mode: 'cors' });
      const ac = res.headers.get('access-control-allow-origin');
      if(res.ok && (ac === '*' || ac !== null)){
        const a = document.createElement('a');
        a.href = url;
        a.download = url.split('/').pop() || 'media';
        document.body.appendChild(a);
        a.click();
        a.remove();
        return;
      } else {
        alert('Download blocked by CORS. Host the file on a CORS-enabled server (Access-Control-Allow-Origin: *).');
        return;
      }
    }catch(e){
      console.warn(e);
      alert('Could not verify download availability. Use the Movie Stream & Download panel to load a direct MP4 URL.');
      return;
    }
  } else {
    alert('No direct media loaded. Use the Movie Stream & Download panel to load a direct MP4 URL for download.');
  }
}

/* -------------------------
   Movie downloader (direct MP4s)
   ------------------------- */
function toggleMovieDownloader(){
  const p = document.getElementById('movieDownloader');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function clearMovieUrls(){
  document.getElementById('movieUrls').value = '';
  document.getElementById('movieContainer').innerHTML = '';
  currentDirectMedia = null;
}

async function loadMovieFromUrls(){
  const raw = document.getElementById('movieUrls').value.trim();
  if(!raw) return alert('Enter at least one direct MP4 URL (comma-separated allowed).');
  const urls = raw.split(',').map(s => s.trim()).filter(Boolean);
  const container = document.getElementById('movieContainer');
  container.innerHTML = 'Checking URLs...';
  // Try each URL for CORS/playability; pick first that works
  for(const url of urls){
    try{
      const res = await fetch(url, { method: 'HEAD', mode: 'cors' });
      const ac = res.headers.get('access-control-allow-origin');
      const contentType = res.headers.get('content-type') || '';
      const ok = res.ok && (ac === '*' || ac !== null) && contentType.includes('video');
      if(ok){
        container.innerHTML = '';
        const video = document.createElement('video');
        video.controls = true;
        video.src = url;
        video.preload = 'metadata';
        video.style.maxWidth = '100%';
        const dl = document.createElement('a');
        dl.href = url;
        dl.download = url.split('/').pop() || 'movie.mp4';
        dl.textContent = 'Download MP4';
        dl.style.display = 'inline-block';
        dl.style.marginTop = '8px';
        container.appendChild(video);
        container.appendChild(dl);
        currentDirectMedia = { type: 'video', url, corsOk: true };
        setServerStatus('Direct MP4 loaded (download available)');
        return;
      }
    }catch(e){
      console.warn('URL check failed', url, e);
    }
  }
  // If none of the direct URLs worked, use the selected embed server (no automatic switching)
  container.innerHTML = 'No direct MP4 with CORS found. Using selected embed server.';
  currentDirectMedia = null;
  showEmbedServer(currentEmbedServerIndex);
}

/* -------------------------
   Utilities
   ------------------------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* -------------------------
   Initialize server select on load
   ------------------------- */
document.addEventListener('DOMContentLoaded', () => {
  populateServerSelect();
  document.getElementById('downloadBtn').style.display = 'inline-block';
});
</script>
</body>
</html>
